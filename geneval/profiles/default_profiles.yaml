profiles:
  rag_default:
    description: "Balanced RAG evaluation for general use"
    metrics:
      - faithfulness
      - answer_relevancy
      - context_recall
    weights:
      faithfulness: 0.4
      answer_relevancy: 0.3
      context_recall: 0.3
    criteria:
      faithfulness: 0.7
      answer_relevancy: 0.7
      context_recall: 0.7
    composite_threshold: 0.7

  strict:
    description: "High-bar evaluation for production deployments"
    metrics:
      - faithfulness
      - answer_relevancy
      - context_recall
      - context_precision
    weights:
      faithfulness: 0.35
      answer_relevancy: 0.25
      context_recall: 0.2
      context_precision: 0.2
    criteria:
      faithfulness: 0.9
      answer_relevancy: 0.85
      context_recall: 0.8
      context_precision: 0.8
    composite_threshold: 0.85

  smoke_test:
    description: "Fast sanity check with relaxed thresholds"
    metrics:
      - faithfulness
      - answer_relevancy
    weights:
      faithfulness: 0.5
      answer_relevancy: 0.5
    criteria:
      faithfulness: 0.5
      answer_relevancy: 0.5
    composite_threshold: 0.5
